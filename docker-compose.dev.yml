services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/postgres?sslmode=disable
      - EMAIL_SERVER_HOST=mailpit
      - EMAIL_SERVER_PORT=1025
      - EMAIL_SERVER_USER=
      - EMAIL_SERVER_PASSWORD=
      - EMAIL_SERVER_FROM=no-reply@example.test
      - EMAIL_NOTIFY_ADDRESS=no-reply@example.test
      - AUTH_URL=http://localhost:3000
      - LISTEN_ADDR=0.0.0.0:3000
      - SECRET_KEY=secret-key
    ports:
      - 3000:3000/tcp
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-mod:/go/pkg/mod
    depends_on:
      db:
        condition: service_healthy
        restart: true
      mailpit:
        condition: service_started

  db:
    image: postgres:16.10-alpine
    environment:
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  cron:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/postgres?sslmode=disable
      - EMAIL_SERVER_HOST=mailpit
      - EMAIL_SERVER_PORT=1025
      - EMAIL_SERVER_USER=
      - EMAIL_SERVER_PASSWORD=
      - EMAIL_SERVER_FROM=no-reply@example.test
      - EMAIL_NOTIFY_ADDRESS=no-reply@example.test
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    command: >
      sh -c "echo '0 2 * * * /app/cleanup >> /var/log/cron.log 2>&1' > /etc/crontabs/root &&
             echo '0 0 1/1 * * /app/remainder >> /var/log/cron.log 2>&1' >> /etc/crontabs/root &&
             crond -f -l 2"

  seed:
    build: .
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/postgres?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "./migrate && ./seed"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - 1025:1025/tcp
      - 8025:8025/tcp

volumes:
  go-cache:
  go-mod:
