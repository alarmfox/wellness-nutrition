<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Sondaggio - Wellness & Nutrition</title>
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="stylesheet" href="/static/css/admin.css" />
    <link rel="stylesheet" href="/static/css/survey-admin.css" />
</head>
<body>
    <div class="header">
        <img src="/static/images/logo.png" alt="Wellness & Nutrition" class="header-logo" />
        <div class="nav">
            <a href="/admin/calendar">Calendario</a>
            <a href="/admin/users">Utenti</a>
            <a href="/admin/instructors">Istruttori</a>
            <a href="/admin/events">Eventi</a>
            <a href="/admin/survey/results" class="active">Sondaggio</a>
            <a href="/admin/user-view">Vista Utente</a>
            <a href="#" data-action="logout">Esci</a>
        </div>
    </div>

    <div class="container">
        <div class="toolbar">
            <h2 class="survey-admin-title">Domande del Sondaggio</h2>
            <button type="button" class="btn" id="createQuestionBtn">
                <span class="material-icons icon-sm">add</span>
                Aggiungi Domanda
            </button>
        </div>

        <div class="question-list" id="questionList">
            <!-- Questions will be loaded here -->
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="questionModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Aggiungi Domanda</h2>
            <form id="questionForm">
                <input type="hidden" id="questionId" name="id">
                <input type="hidden" id="questionSku" name="sku">

                <div class="form-group">
                    <label for="questionIndex">Posizione</label>
                    <input type="number" id="questionIndex" name="index" min="1" required>
                    <small class="survey-help">Specifica la posizione della domanda (1, 2, 3...)</small>
                </div>

                <div class="form-group">
                    <label for="questionText">Testo della Domanda</label>
                    <textarea id="questionText" name="question" required></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="closeQuestionModalBtn">Annulla</button>
                    <button type="submit" class="btn">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/security.js"></script>
    <script src="/static/js/survey-questions.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/ws.js"></script>
</body>
</html>
