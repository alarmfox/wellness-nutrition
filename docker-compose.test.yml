services:
  test-db:
    image: postgres:16.10-alpine
    container_name: wellness-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test123
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test_db"]
      interval: 5s
      retries: 5
      start_period: 10s
      timeout: 5s
